name: PHP checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.0'
          - '8.3'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, gd, mbstring, pdo_sqlite
          coverage: none

      - name: Check PHP syntax
        run: bash scripts/lint-php.sh

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh

  http-integration:
    name: HTTP integration PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.0'
          - '8.3'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, gd, mbstring, openssl, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Install BladeOne for tests
        env:
          BLADEONE_VERSION: 4.19.1
        run: |
          mkdir -p "${RUNNER_TEMP}/bladeone" noreita/BladeOne/lib
          composer --working-dir="${RUNNER_TEMP}/bladeone" require --no-interaction --no-progress --prefer-dist "eftec/bladeone:${BLADEONE_VERSION}"
          cp "${RUNNER_TEMP}/bladeone/vendor/eftec/bladeone/lib/BladeOne.php" noreita/BladeOne/lib/BladeOne.php

      - name: Run HTTP integration tests
        run: bash scripts/integration-test.sh
